mode: ContinuousDelivery
next-version: 0.5.0

branches:
  master:
    regex: ^master$
    mode: ContinuousDelivery
    label: ''
    increment: Patch
    is-release-branch: true

  develop:
    regex: ^dev(elop)?(ment)?$
    mode: ContinuousDeployment
    label: alpha
    increment: Minor
    is-release-branch: false

  release:
    regex: ^releases?[/-]
    mode: ContinuousDelivery
    label: beta
    increment: None
    is-release-branch: true
  feature:
    regex: ^features?[/-]
    mode: ContinuousDelivery
    label: useBranchName
    increment: Inherit
    is-release-branch: false

  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    mode: ContinuousDelivery
    label: PullRequest
    increment: Inherit
    is-release-branch: false

