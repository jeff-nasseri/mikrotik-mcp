# GitVersion configuration for GitVersion 6.x
#
# Workflow: GitHub Flow — all PRs merge directly to master, no develop/release branches.
# Version format published to PyPI: MAJOR.MINOR.PATCH (semVer) / MAJOR.MINOR.PATCH.BUILD (assemblySemVer)
#
# Conventional commit rules:
#   feat:                       → Minor bump  (0.x.0)
#   fix | chore | refactor | …  → Patch bump  (0.0.x)
#   docs | doc | documentation  → No bump     (version unchanged)
#   untyped commit              → Patch bump  (fallback)
#   +semver: breaking/major     → Major bump  (EMERGENCY ONLY — major is frozen at 0)

# GitHubFlow/v1 provides sensible defaults for master-only workflows:
#   - ContinuousDelivery mode on main/master (clean versions, no pre-release labels)
#   - Feature branches get a pre-release label derived from the branch name
workflow: GitHubFlow/v1

# Floor version — GitVersion will never calculate a version below this.
next-version: 0.5.0

# Parse every commit message on the path from HEAD to the last version tag.
# The highest matching rule wins (Minor > Patch > None).
commit-message-incrementing: Enabled

major-version-bump-message: '^\+semver:\s*(breaking|major)'
minor-version-bump-message: '^feat(\(.+\))?!?:'
patch-version-bump-message: '^(fix|chore|refactor|perf|style|ci|test|build|revert)(\(.+\))?!?:'
no-bump-message: '^(docs?|documentation)(\(.+\))?!?:'
