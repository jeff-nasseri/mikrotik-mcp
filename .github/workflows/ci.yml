name: CI

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  lockfile:
    name: Lockfile drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.x"

      - name: Verify uv.lock is up to date
        run: |
          uv lock --check || {
            echo "::error::uv.lock is out of date with pyproject.toml. Run 'uv lock' locally and commit the updated uv.lock."
            exit 1
          }

  version:
    name: GitVersion
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.10.2
        with:
          useConfigFile: true

      - name: Display GitVersion outputs
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "InformationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}"

  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.x"
          python-version: ${{ matrix.python-version }}

      - name: Display GitVersion
        run: |
          echo "SemVer: ${{ needs.version.outputs.semVer }}"
          echo "FullSemVer: ${{ needs.version.outputs.fullSemVer }}"
          echo "InformationalVersion: ${{ needs.version.outputs.informationalVersion }}"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -m "not integration"

  install-paths:
    name: Install-path correctness
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.x"
          python-version: "3.12"

      - name: Build the distributable
        run: uv build --wheel -o dist

      - name: uvx primary path launches the server
        run: |
          WHEEL="$(ls dist/*.whl)"
          uvx --from "$WHEEL" mcp-server-mikrotik --help

      - name: pip alternative installs and launches via `python -m mcp_mikrotik`
        run: |
          WHEEL="$(ls dist/*.whl)"
          uv venv --python 3.12 .venv-pip
          uv pip install --python .venv-pip "$WHEEL"
          .venv-pip/bin/python -m mcp_mikrotik --help

      - name: below-minimum Python is refused with the 3.10 floor stated
        run: |
          WHEEL="$(ls dist/*.whl)"
          uv python install 3.9
          uv venv --python 3.9 .venv39
          if uv pip install --python .venv39 "$WHEEL" 2> refuse.log; then
            echo "::error::install on Python 3.9 unexpectedly succeeded; the >=3.10 floor is not enforced"
            exit 1
          fi
          if ! grep -q "3.10" refuse.log; then
            echo "::error::refusal did not state the 3.10 minimum"
            cat refuse.log
            exit 1
          fi
          echo "Correctly refused on Python 3.9 with the 3.10 minimum stated:"
          grep -i "3.10" refuse.log
