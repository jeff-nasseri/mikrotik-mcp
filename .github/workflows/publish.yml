# =============================================================================
# GitHub Actions Workflow: Build and Publish Python Package to PyPI
# =============================================================================
#
# Purpose:
#   Automatically builds, tests, and publishes the Python package to PyPI
#   whenever changes are pushed to the master branch. Uses GitVersion for
#   semantic versioning and creates GitHub releases with corresponding tags.
#
# Version format: MAJOR.MINOR.PATCH.FIX (assemblySemVer, 4-part PEP 440)
#   feat:   bumps MINOR  →  0.x.0.0
#   chore:  bumps PATCH  →  0.0.x.0
#   fix:    bumps PATCH  →  0.0.x.0  (4th digit tracks commits since last tag)
#   docs:   no bump
#
# Workflow Steps:
#   1. Version: Calculate semantic version using GitVersion
#   2. Build:   Create Python distribution packages (wheel and source)
#   3. Test:    Run unit test suite across Python 3.10, 3.11, and 3.12
#   4. Publish: Upload package to PyPI (skip-existing prevents duplicate failures)
#   5. Release: Create GitHub release with auto-generated tag
#
# Triggers:
#   - Push to master branch
#
# Requirements:
#   - GitVersion.yml configuration file in repository root
#   - PyPI trusted publisher configured for GitHub Actions
#
# =============================================================================
name: Build and Publish to PyPI

on:
  push:
    branches:
      - master

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.assemblySemVer }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      should_publish: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: '6.x'

      - name: Debug GitVersion
        run: |
          echo "Git tags:"
          git tag -l
          echo "Current commit:"
          git log --oneline -5
          echo "GitVersion config:"
          cat GitVersion.yml

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.10.2
        with:
          useConfigFile: true

      - name: Display GitVersion outputs
        run: |
          echo "SemVer:          ${{ steps.gitversion.outputs.semVer }}"
          echo "AssemblySemVer:  ${{ steps.gitversion.outputs.assemblySemVer }}"
          echo "Major:           ${{ steps.gitversion.outputs.major }}"
          echo "Minor:           ${{ steps.gitversion.outputs.minor }}"
          echo "Patch:           ${{ steps.gitversion.outputs.patch }}"
          echo "PreReleaseTag:   ${{ steps.gitversion.outputs.preReleaseTag }}"
          echo "FullSemVer:      ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "BranchName:      ${{ steps.gitversion.outputs.branchName }}"
          echo "CommitsSince:    ${{ steps.gitversion.outputs.commitsSinceVersionSource }}"

  build:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.x"

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/version = ".*"/version = "${{ needs.version.outputs.version }}"/' pyproject.toml

      - name: Build package
        run: uv build

      - name: Check distribution
        run: uvx twine@6 check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.x"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -m "not integration"

  publish:
    runs-on: ubuntu-latest
    needs: [version, build, test]
    if: needs.version.outputs.should_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-server-mikrotik
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        # skip-existing: true means a duplicate version is silently skipped
        # instead of failing the pipeline with a 400 error.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true

  publish-mcp-registry:
    runs-on: ubuntu-latest
    needs: [version, publish]
    # Only run when PyPI publish actually succeeded (not skipped or failed).
    if: needs.version.outputs.should_publish == 'true' && needs.publish.result == 'success'
    permissions:
      id-token: write   # required for GitHub OIDC authentication
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mcp-publisher
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar xf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Update server.json version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Update both the top-level "version" and the package-level "version" fields.
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/g" server.json
          echo "server.json version set to $VERSION"
          cat server.json

      - name: Authenticate with MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  create-release:
    runs-on: ubuntu-latest
    needs: [version, build, publish]
    # Run even when publish was skipped due to a duplicate version (skip-existing).
    # Guard on build success so we never tag a broken build.
    if: always() && needs.version.outputs.should_publish == 'true' && needs.build.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use majorMinorPatch (e.g. v0.7.0) — NOT semVer (e.g. v0.7.0-12).
          # A stable tag is required so GitVersion treats it as a version source
          # on the next run and correctly increments on the next feat:/fix: commit.
          # Using a pre-release tag caused GitVersion to lock onto the same
          # major.minor.patch indefinitely, regardless of commit type.
          TAG="v${{ needs.version.outputs.majorMinorPatch }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag -a "$TAG" -m "Release $TAG (package ${{ needs.version.outputs.version }})"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.majorMinorPatch }}
          name: Release v${{ needs.version.outputs.majorMinorPatch }}
          body: |
            ## Changes in v${{ needs.version.outputs.majorMinorPatch }}

            This release was automatically created by GitHub Actions.

            **PyPI package version:** ${{ needs.version.outputs.version }}
            **Git tag:** v${{ needs.version.outputs.majorMinorPatch }}
            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
